name: CI Pipeline and Dockerize Model

on:
  push:
    paths:
      - 'MLProject/**'
  workflow_dispatch:

env:
  MLFLOW_TRACKING_URI: ${{ secrets.DAGSHUB_MLFLOW_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USER_NAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
  DAGSHUB_USER_NAME: ${{ secrets.DAGSHUB_USER_NAME }}
  DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

jobs:
  train-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: pip install mlflow dagshub pandas scikit-learn

      - name: Train model via MLproject
        run: |
          cd MLProject && mlflow run . -e tune 

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image using MLflow
        run: |
          # Fetch the latest model URI from DagsHub
          # Assuming the model is registered as "WineQualityModel_Tuned"
          # In a real CI, we'd use API to fetch the latest version. For simplicity, we assume MLflow build-docker will fetch it
          # Usage: mlflow models build-docker -m "models:/WineQualityModel_Tuned/latest" -n mydockerhubuser/wine_model:latest
          mlflow models build-docker -m "models:/WineQualityModel_Tuned/latest" -n ${{ secrets.DOCKER_HUB_USERNAME }}/wine_model:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/wine_model:latest
